<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>쿠팡 숏폼 자동 영상 생성기</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#F4F6FB;color:#1a1a2e;font-family:'Apple SD Gothic Neo','Noto Sans KR',-apple-system,sans-serif;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#c5cae9;border-radius:4px}

/* ── HEADER ── */
.header{
  background:linear-gradient(135deg,#5C35E8 0%,#9B27AF 50%,#E91E8C 100%);
  padding:16px 24px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  position:sticky;top:0;z-index:100;
  box-shadow:0 4px 20px rgba(92,53,232,.25)
}
.h-icon{width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;
  backdrop-filter:blur(10px)}
.h-title{font-weight:800;font-size:16px;color:#fff;letter-spacing:-.3px}
.h-sub{font-size:11px;color:rgba(255,255,255,.75);margin-top:2px}
.h-badges{margin-left:auto;display:flex;gap:6px;flex-shrink:0}
.h-badge{font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;
  background:rgba(255,255,255,.2);color:#fff;backdrop-filter:blur(10px)}

/* ── BODY ── */
.wrap{max-width:940px;margin:0 auto;padding:28px 20px}
.two-col{display:grid;grid-template-columns:1fr 390px;gap:28px;align-items:start}
@media(max-width:760px){.two-col{grid-template-columns:1fr}}

/* ── STEP BAR ── */
.step-bar{display:flex;align-items:center;margin-bottom:28px}
.sdot{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:13px;flex-shrink:0;transition:all .3s}
.sdot.done{background:linear-gradient(135deg,#5C35E8,#E91E8C);color:#fff;box-shadow:0 4px 12px rgba(92,53,232,.3)}
.sdot.active{background:#fff;color:#5C35E8;border:2.5px solid #5C35E8;box-shadow:0 0 0 4px rgba(92,53,232,.12)}
.sdot.idle{background:#E8EAF6;color:#9FA8DA}
.sline{flex:1;height:2px;margin:0 8px;margin-bottom:18px;transition:all .3s}
.slabel{font-size:10px;margin-top:5px;white-space:nowrap;font-weight:600}

/* ── CARD ── */
.card{background:#fff;border-radius:20px;padding:24px;margin-bottom:20px;
  box-shadow:0 2px 16px rgba(92,53,232,.06);border:1px solid #EDE7F6}

/* ── SECTION HEADER ── */
.sec{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.sec-num{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#5C35E8,#E91E8C);
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0}
.sec-name{font-weight:700;font-size:15px;color:#1a1a2e}

/* ── FIELDS ── */
.field{margin-bottom:16px}
.field label{font-size:12px;color:#5C6BC0;font-weight:700;display:block;margin-bottom:7px;letter-spacing:.3px}
.field-hint{font-size:11px;color:#9FA8DA;margin-top:6px;line-height:1.6}
input[type=text],input[type=url],textarea,select{
  width:100%;box-sizing:border-box;
  background:#F8F7FF;border:2px solid #E8EAF6;border-radius:12px;
  padding:13px 16px;color:#1a1a2e;font-size:14px;outline:none;font-family:inherit;
  transition:all .2s}
input:focus,textarea:focus,select:focus{border-color:#5C35E8;background:#fff;box-shadow:0 0 0 4px rgba(92,53,232,.08)}
input::placeholder,textarea::placeholder{color:#B0BEC5}
textarea{resize:none;line-height:1.7}
select option{background:#fff;color:#1a1a2e}
.two-f{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* ── LINK ROW ── */
.link-row{display:flex;gap:10px;align-items:stretch}
.link-row input{flex:1;min-width:0}
.fetch-btn{padding:0 18px;font-size:13px;font-weight:700;
  border:2px solid #5C35E8;border-radius:12px;background:#5C35E8;color:#fff;
  cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .2s;flex-shrink:0}
.fetch-btn:hover{background:#4527A0;border-color:#4527A0}
.fetch-btn:disabled{background:#E8EAF6;border-color:#E8EAF6;color:#9FA8DA;cursor:not-allowed}

/* ── AUTO FILL BADGE ── */
.af-badge{display:inline-flex;align-items:center;gap:6px;
  background:linear-gradient(135deg,#E8F5E9,#F3E5F5);
  border:1.5px solid #CE93D8;border-radius:20px;
  padding:5px 12px;font-size:12px;color:#6A1B9A;font-weight:700;margin-top:8px}
.autofilled{border-color:#7E57C2!important;background:#EDE7F6!important}

/* ── PLATFORM BUTTONS ── */
.plt-btns{display:flex;gap:10px}
.plt-btn{flex:1;padding:14px 8px;font-size:12px;font-weight:700;cursor:pointer;
  border-radius:14px;border:2px solid #E8EAF6;background:#F8F7FF;color:#7986CB;
  transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:5px;font-family:inherit}
.plt-btn:hover{border-color:#9FA8DA;background:#EDE7F6}
.plt-icon{font-size:22px}

/* ── DURATION ── */
.dur-btns{display:flex;gap:8px}
.dur-btn{flex:1;padding:12px 4px;font-size:15px;font-weight:700;cursor:pointer;
  border-radius:12px;border:2px solid #E8EAF6;background:#F8F7FF;color:#7986CB;
  transition:all .2s;font-family:inherit}
.dur-btn:hover{border-color:#9FA8DA}

/* ── BUTTONS ── */
.btn{width:100%;padding:16px;font-weight:700;font-size:15px;border:none;border-radius:14px;
  cursor:pointer;transition:all .2s;font-family:inherit;letter-spacing:-.2px}
.btn:disabled{background:#E8EAF6;color:#B0BEC5;cursor:not-allowed;box-shadow:none}
.btn-purple{background:linear-gradient(135deg,#5C35E8,#E91E8C);color:#fff;
  box-shadow:0 6px 20px rgba(92,53,232,.3)}
.btn-purple:hover:not(:disabled){box-shadow:0 8px 28px rgba(92,53,232,.4);transform:translateY(-1px)}
.btn-orange{background:linear-gradient(135deg,#FF6B35,#F44336);color:#fff;
  box-shadow:0 6px 20px rgba(255,107,53,.3)}
.btn-orange:hover:not(:disabled){box-shadow:0 8px 28px rgba(255,107,53,.4);transform:translateY(-1px)}
.btn-back{flex:1;padding:15px;background:#F4F6FB;color:#5C6BC0;
  border:2px solid #E8EAF6;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-back:hover{background:#EDE7F6;border-color:#9FA8DA}
.btn-row{display:flex;gap:12px;margin-top:12px}
.btn-ghost{width:100%;padding:12px;background:#F4F6FB;color:#7986CB;
  border:2px solid #E8EAF6;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-ghost:hover{background:#EDE7F6}

/* ── STATUS BOXES ── */
.hint-purple{font-size:12px;color:#5C35E8;margin-top:6px;font-weight:600}
.hint-green{font-size:12px;color:#2E7D32;margin-top:6px;font-weight:600}
.hint-gray{font-size:12px;color:#90A4AE;margin-top:6px}
.hint-red{font-size:12px;color:#C62828;margin-top:6px}
.info-box{background:linear-gradient(135deg,#EDE7F6,#F3E5F5);border:1.5px solid #CE93D8;
  border-radius:14px;padding:16px;margin-bottom:16px}
.info-title{font-size:12px;color:#6A1B9A;font-weight:700;margin-bottom:10px}
.warn-box{background:#FFF8E1;border:1.5px solid #FFCC02;border-radius:14px;padding:14px;margin-bottom:14px}
.warn-title{font-size:12px;color:#E65100;font-weight:700;margin-bottom:6px}
.warn-sub{font-size:12px;color:#BF360C;line-height:1.7}
.err-box{background:#FFEBEE;border:1.5px solid #EF9A9A;border-radius:12px;
  padding:12px 14px;margin-bottom:14px;font-size:13px;color:#C62828;font-weight:500}
.divider{height:1px;background:linear-gradient(90deg,transparent,#E8EAF6,transparent);margin:20px 0}
.fetch-loading{display:flex;align-items:center;gap:10px;background:#F3E5F5;
  border:1.5px solid #CE93D8;border-radius:12px;padding:14px 16px;margin-top:10px;
  font-size:13px;color:#6A1B9A;font-weight:600}

/* ── VOICE LIST ── */
.voice-item{width:100%;padding:12px 16px;background:#F8F7FF;border:2px solid #E8EAF6;
  border-radius:12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;
  transition:all .2s;margin-bottom:8px;font-family:inherit;text-align:left}
.voice-item:hover{border-color:#9FA8DA;background:#EDE7F6}
.v-name{font-weight:700;color:#1a1a2e;font-size:13px}
.v-lang{font-size:11px;color:#90A4AE;margin-left:8px}
.v-status{font-size:11px;color:#9FA8DA}
input[type=range]{width:100%;height:5px;border-radius:3px;accent-color:#5C35E8;cursor:pointer;border:none;padding:0;background:transparent}
.range-labels{display:flex;justify-content:space-between;font-size:11px;color:#9FA8DA;margin-top:4px}

/* ── SCRIPT PANEL ── */
.script-title-card{background:linear-gradient(135deg,#EDE7F6,#FCE4EC);
  border:1.5px solid #CE93D8;border-radius:14px;padding:14px 16px;margin-bottom:10px}
.script-scene{background:#F8F7FF;border:1.5px solid #E8EAF6;border-radius:12px;
  padding:12px 16px;margin-bottom:8px;transition:border-color .2s}
.script-scene:hover{border-color:#9FA8DA}
.scene-hd{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.scene-tag{font-size:10px;font-weight:800;color:#fff;background:linear-gradient(135deg,#5C35E8,#E91E8C);
  padding:3px 10px;border-radius:20px}
.scene-dur{font-size:11px;color:#9FA8DA;font-weight:600}
.scene-speak{margin-left:auto;font-size:11px;color:#5C35E8;background:#EDE7F6;
  border:1.5px solid #9FA8DA;border-radius:8px;padding:4px 12px;cursor:pointer;font-family:inherit;font-weight:600}
.scene-speak:hover{background:#D1C4E9;border-color:#5C35E8}
.scene-text{font-size:13px;color:#37474F;line-height:1.9;font-weight:500}
.hashtags{font-size:12px;color:#5C35E8;line-height:2.2;word-break:break-all;margin-top:8px;font-weight:600}

/* ── LOADING ── */
.loading-card{margin-top:14px;background:linear-gradient(135deg,#F3E5F5,#EDE7F6);
  border:1.5px solid #CE93D8;border-radius:16px;padding:28px;text-align:center}
.dots{display:flex;justify-content:center;gap:8px;margin-top:14px}
.dot{width:9px;height:9px;border-radius:50%;background:#5C35E8;animation:da 1.2s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes da{0%,80%,100%{transform:scale(.7);opacity:.4}40%{transform:scale(1.2);opacity:1}}

/* ── PHONE ── */
.phone-wrap{display:flex;flex-direction:column;align-items:center;gap:14px}
.phone-shell{
  background:linear-gradient(145deg,#2a2a3e,#1a1a2e);
  border-radius:36px;padding:12px 10px;position:relative;
  box-shadow:0 30px 80px rgba(26,26,46,.5),0 0 0 1px rgba(255,255,255,.08),inset 0 1px 0 rgba(255,255,255,.1)}
.phone-screen{background:#000;border-radius:28px;overflow:hidden}
.phone-notch{position:absolute;top:19px;left:50%;transform:translateX(-50%);width:72px;height:22px;background:#000;border-radius:11px}
.phone-home{width:82px;height:4px;background:#3a3a4e;border-radius:2px;margin:8px auto 2px}
.phone-btn-l{position:absolute;left:-5px;width:4px;background:#2a2a3e;border-radius:2px 0 0 2px}
.phone-btn-r{position:absolute;right:-5px;width:4px;background:#2a2a3e;top:115px;height:58px;border-radius:0 2px 2px 0}
.sdots{display:flex;gap:5px;width:100%}
.sdot2{flex:1;height:4px;border-radius:2px;transition:all .4s}
.now-lbl{font-size:11px;color:#7986CB;align-self:flex-start;font-weight:600}

/* ── CONTROLS ── */
.ctrl-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%}
.ctrl-btn{padding:14px 8px;font-weight:700;font-size:13px;border-radius:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:6px;font-family:inherit;transition:all .2s}
.c-play{border:2px solid var(--pc,#5C35E8);background:var(--pb,#EDE7F6);color:var(--pc,#5C35E8)}
.c-play:hover{opacity:.85}
.c-stop{border:2px solid #E8EAF6;background:#F4F6FB;color:#5C6BC0}
.c-rec{border:none;color:#fff}
.c-rec.idle{background:linear-gradient(135deg,#5C35E8,#E91E8C);box-shadow:0 6px 18px rgba(92,53,232,.3)}
.c-rec.recording{background:linear-gradient(135deg,#C62828,#E53935);box-shadow:0 6px 18px rgba(198,40,40,.3)}
.c-rec.off{background:#E8EAF6;color:#B0BEC5;cursor:not-allowed}

/* ── DOWNLOAD ── */
.dl-link{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;
  background:linear-gradient(135deg,#2E7D32,#43A047);color:#fff;border-radius:12px;
  font-size:14px;font-weight:700;text-decoration:none;
  box-shadow:0 6px 16px rgba(46,125,50,.3);transition:all .2s}
.dl-link:hover{box-shadow:0 8px 22px rgba(46,125,50,.4);transform:translateY(-1px)}
.dl-tip{font-size:11px;color:#546E7A;line-height:1.8;margin-top:8px}

/* ── COPY BTN ── */
.copy-btn{background:#F4F6FB;color:#5C6BC0;border:2px solid #E8EAF6;border-radius:8px;
  padding:6px 14px;cursor:pointer;font-size:12px;font-weight:700;display:inline-flex;
  align-items:center;gap:5px;white-space:nowrap;transition:all .2s;font-family:inherit}
.copy-btn:hover{background:#EDE7F6;border-color:#9FA8DA}
.copy-btn.copied{background:#E8F5E9;color:#2E7D32;border-color:#A5D6A7}

/* ── BLOG BOX ── */
.blog-box{width:100%;background:#fff;border:1.5px solid #E8EAF6;border-radius:16px;overflow:hidden;margin-top:10px}
.blog-hd{background:linear-gradient(135deg,#FFF3E0,#FBE9E7);padding:12px 16px;
  display:flex;align-items:center;justify-content:space-between;border-bottom:1.5px solid #FFCCBC}
.blog-hd-title{font-size:13px;font-weight:700;color:#BF360C}
.blog-content{padding:16px;max-height:320px;overflow-y:auto;font-size:13px;color:#37474F;
  line-height:2;white-space:pre-wrap;word-break:break-word}

/* ── NOTICE ── */
.notice{width:100%;background:#F4F6FB;border:1.5px solid #E8EAF6;border-radius:12px;
  padding:14px;font-size:12px;color:#546E7A;line-height:1.9;font-weight:500}

/* ── SOURCE LINKS ── */
.src-item{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start}
.src-badge{font-size:10px;font-weight:800;padding:3px 8px;border-radius:6px;
  flex-shrink:0;text-decoration:none;margin-top:1px}
.src-desc{font-size:12px;color:#4A148C;line-height:1.6}

/* ── OK BOX ── */
.ok-box{width:100%;background:linear-gradient(135deg,#E8F5E9,#F1F8E9);
  border:1.5px solid #A5D6A7;border-radius:14px;padding:16px}

@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeIn .3s ease}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="h-icon">🎬</div>
  <div>
    <div class="h-title">쿠팡 숏폼 자동 영상 생성기</div>
    <div class="h-sub">링크 붙여넣기 → AI 상품 자동인식 → 영상 + 음성 + 블로그 자동생성</div>
  </div>
  <div class="h-badges">
    <span class="h-badge">▶ 쇼츠</span>
    <span class="h-badge">◉ 릴스</span>
    <span class="h-badge">♪ 틱톡</span>
  </div>
</div>

<div class="wrap">
  <div class="step-bar" id="stepBar"></div>
  <div id="app"></div>
</div>

<video id="srcVideo" style="display:none" muted playsinline loop crossorigin="anonymous"></video>

<script>
// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
const S={
  step:0,
  affLink:'',productName:'',productPrice:'',productFeats:'',
  platform:'tiktok',duration:30,hookStyle:'shock',
  videoSrc:'',videoLoaded:false,videoErr:'',
  voices:[],selVoiceIdx:0,ttsRate:1.05,ttsPitch:1.05,
  loading:false,blogLoading:false,fetchLoading:false,
  script:null,blog:'',showBlog:false,
  isPlaying:false,isRecording:false,
  curScene:0,sceneP:0,
  videoUrl:null,errMsg:'',autoFilled:false,
};

const PLTS=[
  {id:'youtube',label:'유튜브 쇼츠',icon:'📺',color:'#FF0000',bg:'#FFEBEE'},
  {id:'instagram',label:'인스타 릴스',icon:'📸',color:'#E91E63',bg:'#FCE4EC'},
  {id:'tiktok',label:'틱톡',icon:'🎵',color:'#00BCD4',bg:'#E0F7FA'},
];
const HOOKS=[
  {id:'shock',label:'⚡ 충격 후크'},{id:'question',label:'🤔 질문 후크'},
  {id:'story',label:'📖 스토리 후크'},{id:'ranking',label:'🏆 랭킹 후크'},
];
const SK=['hook','problem','solution','proof','cta'];
const SL=['HOOK','공감','소개','신뢰','CTA'];
const SD=[3,5,8,5,4];
const STEPS=['상품 정보','영상·음성','영상 완성'];
const CW=360,CH=640;
const MODEL='claude-sonnet-4-20250514';
const API='https://api.anthropic.com/v1/messages';

// ══════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════
function render(){
  renderSteps();
  const el=document.getElementById('app');
  el.innerHTML=S.step===0?t0():S.step===1?t1():t2();
  el.className='fade-in';
  bind();
  if(S.step===2) initCanvas();
}

function renderSteps(){
  const b=document.getElementById('stepBar');
  b.innerHTML=STEPS.map((l,i)=>{
    const cls=i<S.step?'done':i===S.step?'active':'idle';
    const lc=i===S.step?'#5C35E8':i<S.step?'#5C35E8':'#9FA8DA';
    const bg=i<S.step?'#7C4DFF':i===S.step?'#fff':'#E8EAF6';
    const lb=i<S.step?'#7C4DFF':'#E8EAF6';
    return `<div style="display:flex;flex-direction:column;align-items:center;gap:5px">
      <div class="sdot ${cls}">${i<S.step?'✓':i+1}</div>
      <span class="slabel" style="color:${lc}">${l}</span>
    </div>${i<STEPS.length-1?`<div class="sline" style="background:${lb}"></div>`:''}`;
  }).join('');
}

// ══════════════════════════════════════════
//  STEP 0
// ══════════════════════════════════════════
function t0(){
  const plt=PLTS.find(p=>p.id===S.platform);
  const bc=S.affLink.includes('coupang')?'#5C35E8':'#E8EAF6';
  const canGo=S.affLink&&S.productName;
  return `<div>
<div class="card">
  <div class="sec"><div class="sec-num">1</div><div class="sec-name">🔗 쿠팡파트너스 링크</div></div>

  <div class="field">
    <label>파트너스 전용 링크 *</label>
    <div class="link-row">
      <input type="url" id="affLink" value="${ea(S.affLink)}" placeholder="https://link.coupang.com/a/..." style="border-color:${bc}">
      <button class="fetch-btn" onclick="autoFetch()" ${S.fetchLoading||!S.affLink?'disabled':''}>
        ${S.fetchLoading?'⏳ 검색 중...':'🔍 상품 자동인식'}
      </button>
    </div>
    ${S.affLink.includes('coupang')?'<div class="hint-purple">✓ 쿠팡파트너스 링크 확인됨</div>':'<div class="field-hint">partners.coupang.com에서 발급한 전용 링크를 입력하세요</div>'}
  </div>

  ${S.fetchLoading?`<div class="fetch-loading">
    <div class="dots" style="margin:0"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    <span>AI가 쿠팡에서 상품 정보를 검색하고 있어요... (10~20초 소요)</span>
  </div>`:''}
  ${S.autoFilled&&!S.fetchLoading?`<div class="af-badge">✨ 상품 정보 자동입력 완료! 내용을 확인·수정 후 진행하세요</div>`:''}
</div>

<div class="card">

//  AUTO FETCH
// ══════════════════════════════════════════
async function autoFetch(){
  const link=(document.getElementById('affLink')?.value||'').trim()||S.affLink;
  if(!link){ alert('파트너스 링크를 먼저 입력해주세요.'); return; }
  S.affLink=link;
  S.fetchLoading=true;
  S.autoFilled=false;
  S.errMsg='';
  render();

  const prompt=`아래 쿠팡 링크의 상품 정보를 웹에서 검색해서 알아내주세요.

링크: ${link}

이 링크는 쿠팡파트너스 단축 링크입니다. 링크를 방문하거나, URL에서 상품 ID를 추출하거나, 쿠팡 사이트에서 관련 상품을 검색해서 실제 상품 정보를 찾아주세요.

찾은 정보를 아래 JSON 형식으로만 응답하세요. 설명, 마크다운 없이 JSON만:
{
  "productName": "정확한 상품명 브랜드 포함 (예: 다이슨 에어랩 컴플리트 롱)",
  "productPrice": "가격 숫자와 콤마만 (예: 599,000)",
  "productFeats": "핵심 특징 5~7가지 쉼표 구분 (예: 무선사용가능,경량설계,노이즈캔슬링,방수IPX5,30시간배터리)"
}`;

  try{
    const raw = await claudeWithWebSearch(prompt);
    const start=raw.indexOf('{'), end=raw.lastIndexOf('}');
    if(start===-1||end===-1||end<=start) throw new Error('JSON을 찾을 수 없습니다');
    const info=JSON.parse(raw.slice(start,end+1));
    if(!info.productName) throw new Error('상품명을 찾지 못했습니다');

    S.productName  = info.productName  || '';
    S.productPrice = info.productPrice || '';
    S.productFeats = info.productFeats || '';
    S.autoFilled   = true;
    S.errMsg       = '';
    S.fetchLoading = false;
    render();

    // 렌더 후 직접 DOM에 값 주입 + 초록 깜빡임
    requestAnimationFrame(()=>{
      const fn=document.getElementById('productName');
      const fp=document.getElementById('productPrice');
      const ff=document.getElementById('productFeats');
      if(fn){ fn.value=S.productName;  flashGreen(fn); }
      if(fp){ fp.value=S.productPrice; flashGreen(fp); }
      if(ff){ ff.value=S.productFeats; flashGreen(ff); }
    });

  } catch(err){
    S.errMsg='⚠️ 자동인식 실패: '+(err.message||'다시 시도해주세요')+'  →  상품 정보를 직접 입력하세요.';
    S.fetchLoading=false;
    render();
  }
}

function flashGreen(el){
  el.style.transition='all 0.4s';
  el.style.borderColor='#43A047';
  el.style.backgroundColor='#E8F5E9';
  setTimeout(()=>{
    el.style.borderColor='#7C4DFF';
    el.style.backgroundColor='#EDE7F6';
  },1200);
}

function loadVoices(){
  S.voices=(window.speechSynthesis?.getVoices()||[]).filter(v=>v.lang.startsWith('ko'));
  if(!S.voices.length)window.speechSynthesis?.addEventListener('voiceschanged',()=>{
    S.voices=(window.speechSynthesis?.getVoices()||[]).filter(v=>v.lang.startsWith('ko'));
    if(S.step===1)render();
  },{once:true});
}
function speak(t){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);
  u.lang='ko-KR';u.rate=S.ttsRate;u.pitch=S.ttsPitch;
  if(S.voices[S.selVoiceIdx])u.voice=S.voices[S.selVoiceIdx];
  window.speechSynthesis.speak(u);
}
function stopSpeech(){window.speechSynthesis?.cancel();}

function testVid(url){

  v.crossOrigin='anonymous';v.src=url;v.muted=true;v.load();

  v.addEventListener('error',()=>{S.videoErr='영상을 불러올 수 없습니다. CORS 허용 직접 링크를 사용하세요.';if(S.step===1)render();},{once:true});
}

function wrap(ctx,text,mw,font){
  ctx.font=font;const ws=text.split(' ');let ls=[],l='';
  for(const w of ws){const t=l+(l?' ':'')+w;if(ctx.measureText(t).width>mw&&l){ls.push(l);l=w;}else l=t;}
  if(l)ls.push(l);return ls;
}
function drawF(cv,o){
  const{vEl,sub,name,price,link,color,p,idx,tot,cta}=o;
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
  if(vEl&&vEl.readyState>=2)ctx.drawImage(vEl,0,0,W,H);
  else{const g=ctx.createLinearGradient(0,0,W,H);g.addColorStop(0,'#1a0035');g.addColorStop(1,'#06001a');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);}
  const vg=ctx.createLinearGradient(0,0,0,H);vg.addColorStop(0,'rgba(0,0,0,.55)');vg.addColorStop(.35,'rgba(0,0,0,.1)');vg.addColorStop(.65,'rgba(0,0,0,.1)');vg.addColorStop(1,'rgba(0,0,0,.82)');ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(0,0,0,.4)';ctx.fillRect(0,0,W,36);
  ctx.font='bold 11px sans-serif';ctx.fillStyle='#fff';ctx.textAlign='left';ctx.fillText('9:41',14,23);ctx.textAlign='right';ctx.fillText('▌▌ ◼◼◼◼',W-12,23);
  [['❤','2.4만'],['💬','843'],['⭐','저장'],['↗','공유']].forEach(([e,s],i)=>{const bx=W-32,by=H-100-i*66;ctx.beginPath();ctx.arc(bx,by,20,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,.45)';ctx.fill();ctx.font='18px sans-serif';ctx.textAlign='center';ctx.fillText(e,bx,by+7);ctx.font='bold 9px sans-serif';ctx.fillStyle='#fff';ctx.fillText(s,bx,by+22);});
  ctx.fillStyle='rgba(255,255,255,.2)';ctx.fillRect(0,H-3,W,3);ctx.fillStyle=color;ctx.fillRect(0,H-3,W*((idx+p)/tot),3);
  ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(0,H-90,W,90);
  ctx.font='bold 13px sans-serif';ctx.fillStyle='#fff';ctx.textAlign='left';ctx.fillText('@'+(name||'').replace(/\s/g,'_').toLowerCase().slice(0,16),12,H-68);
  ctx.font='11px sans-serif';ctx.fillStyle='rgba(255,255,255,.65)';ctx.fillText((link||'').slice(0,40)+((link||'').length>40?'…':''),12,H-50);
  if(price){ctx.fillStyle='#FFD700';ctx.font='bold 12px sans-serif';ctx.fillText('💰 '+price+'원',12,H-30);}
  if(name){ctx.font='bold 12px sans-serif';const cw=ctx.measureText((name||'').slice(0,22)).width+24;ctx.beginPath();if(ctx.roundRect)ctx.roundRect(W/2-cw/2,44,cw,22,11);else ctx.rect(W/2-cw/2,44,cw,22);ctx.fillStyle=color+'cc';ctx.fill();ctx.fillStyle='#fff';ctx.textAlign='center';ctx.fillText((name||'').slice(0,22),W/2,59);}
  if(sub){const rev=Math.min(Math.floor(p*sub.length*2.2),sub.length),vis=sub.slice(0,rev);const font="bold 17px 'Apple SD Gothic Neo','Noto Sans KR',sans-serif";const ls=wrap(ctx,vis,W-60,font);const lh=28,bh=ls.length*lh+16,by=H-130-bh;ctx.beginPath();if(ctx.roundRect)ctx.roundRect(20,by-4,W-40,bh,10);else ctx.rect(20,by-4,W-40,bh);ctx.fillStyle='rgba(0,0,0,.7)';ctx.fill();ctx.font=font;ctx.fillStyle='#fff';ctx.textAlign='center';ctx.shadowColor='#000';ctx.shadowBlur=8;ls.forEach((l,i)=>ctx.fillText(l,W/2,by+i*lh+lh-4));ctx.shadowBlur=0;}
  if(cta&&p>.45){const a=Math.min((p-.45)/.25,1);ctx.globalAlpha=a;ctx.beginPath();if(ctx.roundRect)ctx.roundRect(24,H-162,W-48,46,12);else ctx.rect(24,H-162,W-48,46);ctx.fillStyle=color;ctx.fill();ctx.font="bold 14px sans-serif";ctx.fillStyle='#fff';ctx.textAlign='center';ctx.fillText('🛒  쿠팡에서 최저가 확인하기',W/2,H-132);ctx.globalAlpha=1;}
  if(Math.floor(Date.now()/700)%2){ctx.beginPath();ctx.arc(W-18,24,5,0,Math.PI*2);ctx.fillStyle='#F44336';ctx.fill();}
}

// ══════════════════════════════════════════
//  ANIMATION
// ══════════════════════════════════════════
let rafId=null,rec=null,recChunks=[];
const sIdx={v:0},sStart={v:0},playing={v:false};
function scenes(){
  if(!S.script)return[];
  const tot=SD.reduce((a,b)=>a+b,0);
  return SK.map((k,i)=>({key:k,text:S.script[k]||'',isCTA:k==='cta',dur:Math.max(Math.round((SD[i]/tot)*S.duration),1)}));
}
function tick(){
  if(!playing.v)return;
  const cv=document.getElementById('cv');if(!cv){playing.v=false;return;}
  const ss=scenes(),idx=sIdx.v;if(idx>=ss.length)return;
  const sc=ss[idx],el=(performance.now()-sStart.v)/1000,p=Math.min(el/sc.dur,1);
  S.curScene=idx;S.sceneP=p;
  updDots(idx);
  const vEl=document.getElementById('srcVideo');
  if(vEl&&vEl.readyState>=2&&vEl.paused)vEl.play().catch(()=>{});
  if(vEl&&vEl.duration&&vEl.currentTime>=vEl.duration-.1)vEl.currentTime=0;
  const plt=PLTS.find(x=>x.id===S.platform);
  drawF(cv,{vEl,sub:sc.text,name:S.productName,price:S.productPrice,link:S.affLink,color:plt.color,p,idx,tot:ss.length,cta:sc.isCTA});
  if(p>=1){const next=idx+1;if(next<ss.length){sIdx.v=next;sStart.v=performance.now();speak(ss[next].text);}else{playing.v=false;S.isPlaying=false;if(rec&&rec.state!=='inactive')rec.stop();S.isRecording=false;const vv=document.getElementById('srcVideo');if(vv){vv.pause();vv.currentTime=0;}updCtrl();return;}}
  rafId=requestAnimationFrame(tick);
}
function doPlay(){
  if(!S.script)return;stopSpeech();cancelAnimationFrame(rafId);
  const vEl=document.getElementById('srcVideo');if(vEl)vEl.currentTime=0;
  sIdx.v=0;sStart.v=performance.now();playing.v=true;S.isPlaying=true;S.curScene=0;S.sceneP=0;
  updCtrl();speak(scenes()[0].text);rafId=requestAnimationFrame(tick);
}
function doStop(){
  stopSpeech();cancelAnimationFrame(rafId);playing.v=false;S.isPlaying=false;
  if(rec&&rec.state!=='inactive')rec.stop();S.isRecording=false;
  const vEl=document.getElementById('srcVideo');if(vEl){vEl.pause();vEl.currentTime=0;}updCtrl();
}
function doRec(){
  if(S.isPlaying)return;
  const cv=document.getElementById('cv');if(!cv)return;
  S.videoUrl=null;recChunks=[];
  const stream=cv.captureStream(30);
  const mime=['video/webm;codecs=vp9','video/webm','video/mp4'].find(m=>{try{return MediaRecorder.isTypeSupported(m);}catch(e){return false;}})||'video/webm';
  rec=new MediaRecorder(stream,{mimeType:mime});
  rec.ondataavailable=e=>{if(e.data.size>0)recChunks.push(e.data);};
  rec.onstop=()=>{S.videoUrl=URL.createObjectURL(new Blob(recChunks,{type:mime}));S.isRecording=false;render();};
  rec.start(100);S.isRecording=true;doPlay();
}
function updDots(idx){
  const ds=document.querySelectorAll('.sdot2');
  const plt=PLTS.find(x=>x.id===S.platform);
  ds.forEach((d,i)=>{d.style.background=i<idx?'#5C35E8':i===idx?plt.color:'#E8EAF6';});
  const lbl=document.querySelector('.now-lbl');if(lbl)lbl.textContent=SL[idx]+' 재생 중...';
}
function updCtrl(){
  const w=document.querySelector('.ctrl-btns');if(!w)return;
  const plt=PLTS.find(x=>x.id===S.platform);
  const pb=S.isPlaying?`<button class="ctrl-btn c-stop" onclick="doStop()">⏹ 정지</button>`:`<button class="ctrl-btn c-play" style="--pc:${plt.color};--pb:${plt.bg}" onclick="doPlay()">▶ 미리보기 + 음성</button>`;
  const rc=S.isRecording?'recording':S.isPlaying&&!S.isRecording?'off':'idle';
  w.innerHTML=pb+`<button class="ctrl-btn c-rec ${rc}" onclick="${S.isPlaying&&!S.isRecording?'':'doRec()'}"> ${S.isRecording?'🔴 녹화 중...':'⬇ 영상 저장'}</button>`;
}
function initCanvas(){
  requestAnimationFrame(()=>{
    const cv=document.getElementById('cv');if(!cv||!S.script)return;
    const ss=scenes(),plt=PLTS.find(x=>x.id===S.platform),vEl=document.getElementById('srcVideo');
    drawF(cv,{vEl,sub:ss[0]?.text||'',name:S.productName,price:S.productPrice,link:S.affLink,color:plt.color,p:0,idx:0,tot:ss.length,cta:false});
  });
}

//  API — 웹검색 멀티턴 루프
// ══════════════════════════════════════════
async function claudeWithWebSearch(prompt){
  let messages=[{role:'user',content:prompt}];

  for(let turn=0;turn<8;turn++){
    const r=await fetch(API,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:MODEL,
        max_tokens:1000,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        messages
      })
    });
    if(!r.ok){
      const d=await r.json().catch(()=>({}));
      throw new Error(d?.error?.message||`API 오류 ${r.status}`);
    }
    const d=await r.json();
    const content=d.content||[];
    const texts=content.filter(b=>b.type==='text').map(b=>b.text).join('');

    if(d.stop_reason==='end_turn'){
      if(!texts) throw new Error('응답이 비어있습니다');
      return texts;
    }

    if(d.stop_reason==='tool_use'){
      // 어시스턴트 메시지 추가
      messages.push({role:'assistant',content});
      // 각 tool_use에 tool_result 응답 생성
      const toolUseBlocks=content.filter(b=>b.type==='tool_use');
      if(toolUseBlocks.length===0){
        if(texts) return texts;
        throw new Error('검색 도구 오류');
      }
      const toolResults=toolUseBlocks.map(b=>({
        type:'tool_result',
        tool_use_id:b.id,
        content:'검색을 완료했습니다.'
      }));
      messages.push({role:'user',content:toolResults});
      continue;
    }

    // 기타 (max_tokens 등)
    if(texts) return texts;
    throw new Error('예상치 못한 응답: '+d.stop_reason);
  }
  throw new Error('검색 반복 한도 초과. 다시 시도해주세요.');
}

async function claude(prompt){
  const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:MODEL,max_tokens:1000,messages:[{role:'user',content:prompt}]})});
  if(!r.ok){const d=await r.json().catch(()=>({}));throw new Error(d?.error?.message||`오류 ${r.status}`);}
  const d=await r.json();return(d.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
}

async function genScript(){
  S.videoSrc=g('videoSrc')||S.videoSrc;
  if(!S.productName){S.errMsg='상품명을 입력해주세요.';render();return;}
  S.errMsg='';S.loading=true;S.script=null;S.videoUrl=null;render();
  const hd={shock:'충격 폭로형',question:'공감 질문형',story:'경험담형',ranking:'랭킹 추천형'}[S.hookStyle];
  const p=`한국 TOP 숏폼 크리에이터입니다. ${S.duration}초 숏폼 대사 스크립트를 JSON으로만 응답하세요.
상품명: ${S.productName}
${S.productPrice?`가격: ${S.productPrice}원`:''}
${S.productFeats?`특징: ${S.productFeats}`:''}
파트너스링크: ${S.affLink}
후크: ${hd}
{"title":"클릭율 높은 영상 제목","hook":"0~3초 강렬한 첫마디 (15자 이내 구어체)","problem":"시청자 공감 대사","solution":"상품 핵심 기능 소개 대사","proof":"실 사용 후기 신뢰 대사","cta":"구매 유도 CTA (링크 언급)","hashtags":"#태그1 #태그2 #태그3 #태그4 #태그5 #태그6 #태그7 #태그8"}`;
  try{
    const raw=await claude(p);const s=raw.indexOf('{'),e=raw.lastIndexOf('}');
    if(s===-1||e===-1)throw new Error('응답 파싱 오류');
    S.script=JSON.parse(raw.slice(s,e+1));S.step=2;
  }catch(err){S.errMsg=err.message||'생성 오류. 다시 시도해주세요.';}
  S.loading=false;render();
}

규칙: 맘카페 말투("~해요체","근데","솔직히","대박이에요","강추드려요!" 자연스럽게 사용), AI 티 금지("첫째로","마지막으로","결론적으로" 금지), 실제 구매자처럼(배송,포장,사용 느낌), 단점도 솔직하게, 파트너스 링크 글 중간 2번+마지막 1번, 800~1200자, ## 소제목 포함, 마지막에 "※ 이 포스팅은 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다." 추가`;
