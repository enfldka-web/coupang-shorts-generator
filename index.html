<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>쿠팡 숏폼 자동 영상 생성기</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080808;color:#e0e0e0;font-family:'Apple SD Gothic Neo','Noto Sans KR',-apple-system,sans-serif;min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#222;border-radius:3px}

/* Header */
.header{background:linear-gradient(90deg,#0f0020,#080808);border-bottom:1px solid #141414;padding:13px 18px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
.header-icon{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#7C3AED,#EC4899);display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 20px rgba(124,58,237,.4);flex-shrink:0}
.header-title{font-weight:800;font-size:15px;color:#fff}
.header-sub{font-size:10px;color:#444;margin-top:2px}
.plt-badges{margin-left:auto;display:flex;gap:5px;flex-shrink:0}
.plt-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px}

/* Layout */
.body-wrap{max-width:900px;margin:0 auto;padding:20px 16px}
.two-col{display:grid;grid-template-columns:1fr 380px;gap:24px}
@media(max-width:720px){.two-col{grid-template-columns:1fr}}

/* Steps */
.step-bar{display:flex;align-items:center;margin-bottom:28px}
.step-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;transition:all .3s;flex-shrink:0}
.step-dot.done{background:linear-gradient(135deg,#7C3AED,#EC4899);color:#fff}
.step-dot.active{background:linear-gradient(135deg,#7C3AED,#EC4899);color:#fff;box-shadow:0 0 16px rgba(124,58,237,.5);border:2px solid #A78BFA}
.step-dot.inactive{background:#1a1a1a;color:#444}
.step-line{flex:1;height:2px;transition:all .3s;margin:0 8px;margin-bottom:18px}
.step-label{font-size:10px;margin-top:5px;white-space:nowrap}

/* Section */
.section-title{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.section-num{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#7C3AED,#EC4899);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0}
.section-name{font-weight:700;font-size:15px;color:#fff}

/* Fields */
.field{margin-bottom:14px}
.field label{font-size:12px;color:#888;font-weight:600;display:block;margin-bottom:6px}
.field-hint{font-size:11px;color:#444;margin-top:5px;line-height:1.5}
input[type=text],input[type=url],textarea,select{width:100%;box-sizing:border-box;background:#0f0f0f;border:1.5px solid #222;border-radius:10px;padding:12px 14px;color:#fff;font-size:13px;outline:none;font-family:inherit;transition:border-color .2s}
input:focus,textarea:focus,select:focus{border-color:#7C3AED}
textarea{resize:none;line-height:1.6}
select option{background:#111}
.two-fields{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* Platform buttons */
.plt-btns{display:flex;gap:8px}
.plt-btn{flex:1;padding:12px 6px;font-size:12px;font-weight:700;cursor:pointer;border-radius:10px;border:1.5px solid #1e1e1e;background:#0f0f0f;color:#555;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:4px}
.plt-btn .plt-icon{font-size:20px}

/* Duration buttons */
.dur-btns{display:flex;gap:6px}
.dur-btn{flex:1;padding:11px 4px;font-size:14px;font-weight:700;cursor:pointer;border-radius:8px;border:1.5px solid #1e1e1e;background:#0f0f0f;color:#555;transition:all .2s}

/* Hook select */
.hook-sel{height:46px}

/* Primary button */
.btn-primary{width:100%;padding:15px;font-weight:700;font-size:15px;border:none;border-radius:12px;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-primary:disabled{background:#181818;color:#333;cursor:not-allowed;box-shadow:none}
.btn-primary.purple{background:linear-gradient(135deg,#7C3AED,#EC4899);color:#fff;box-shadow:0 4px 20px rgba(124,58,237,.3)}
.btn-primary.orange{background:linear-gradient(135deg,#FF6B35,#FF3D00);color:#fff;box-shadow:0 4px 20px rgba(255,107,53,.3)}
.btn-back{flex:1;padding:14px;background:#0f0f0f;color:#666;border:1px solid #1e1e1e;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-row{display:flex;gap:10px;margin-top:8px}

/* Boxes */
.info-box{background:#0d0d1a;border:1px solid #7C3AED22;border-radius:10px;padding:14px;margin-bottom:16px}
.info-box-title{font-size:12px;color:#A78BFA;font-weight:700;margin-bottom:10px}
.warn-box{background:#1a1a0a;border:1px solid #FFD70033;border-radius:10px;padding:14px;margin-bottom:16px}
.warn-box-title{font-size:12px;color:#FFD700;margin-bottom:6px}
.warn-box-sub{font-size:11px;color:#666;line-height:1.7}
.ok-box{background:#0d2a0d;border:1px solid #4CAF5033;border-radius:12px;padding:14px;width:100%}
.err-box{background:#1a0808;border:1px solid #ff444433;border-radius:10px;padding:12px;margin-bottom:12px;font-size:13px;color:#ff8888}
.divider{height:1px;background:#141414;margin:18px 0}
.hint-ok{font-size:11px;color:#FF6B35;margin-top:5px}
.hint-green{font-size:11px;color:#4CAF50;margin-top:5px}
.hint-gray{font-size:11px;color:#555;margin-top:5px}

/* Voice list */
.voice-item{padding:10px 14px;background:#0f0f0f;border:1.5px solid #1e1e1e;border-radius:10px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:all .2s;margin-bottom:6px}
.voice-item:hover{border-color:#7C3AED44}
.voice-name{font-weight:700;color:#bbb;font-size:13px}
.voice-lang{font-size:11px;color:#555;margin-left:8px}
.voice-status{font-size:11px;color:#444}

/* Range sliders */
input[type=range]{width:100%;height:4px;border-radius:2px;accent-color:#7C3AED;background:transparent;cursor:pointer;border:none;padding:0}
.range-labels{display:flex;justify-content:space-between;font-size:10px;color:#555;margin-top:3px}

/* Script panel */
.script-title-box{background:#111;border:1px solid #7C3AED33;border-radius:10px;padding:10px 14px;margin-bottom:8px}
.script-scene{background:#0f0f0f;border:1px solid #1a1a1a;border-radius:10px;padding:10px 14px;margin-bottom:6px}
.scene-header{display:flex;gap:6px;align-items:center;margin-bottom:5px}
.scene-tag{font-size:10px;font-weight:700;color:#555;background:#181818;padding:2px 8px;border-radius:4px}
.scene-dur{font-size:10px;color:#333}
.scene-speak{margin-left:auto;font-size:11px;color:#7C3AED;background:#7C3AED18;border:1px solid #7C3AED33;border-radius:6px;padding:3px 10px;cursor:pointer;font-family:inherit}
.scene-text{font-size:13px;color:#ccc;line-height:1.85}
.hashtags{font-size:12px;color:#7C3AED;line-height:2;word-break:break-all;margin-top:6px;padding:8px 0}

/* Loading */
.loading-box{margin-top:14px;background:#0e0818;border:1px solid #7C3AED22;border-radius:12px;padding:22px;text-align:center}
.loading-icon{font-size:34px;margin-bottom:8px}
.loading-title{color:#A78BFA;font-weight:700;margin-bottom:4px}
.loading-sub{font-size:12px;color:#555}
.dots{display:flex;justify-content:center;gap:8px;margin-top:12px}
.dot{width:8px;height:8px;border-radius:50%;background:#7C3AED;animation:dotAnim 1.2s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes dotAnim{0%,80%,100%{transform:scale(.7);opacity:.5}40%{transform:scale(1.2);opacity:1}}

/* Phone */
.phone-wrap{display:flex;flex-direction:column;align-items:center;gap:12px}
.phone-shell{background:linear-gradient(145deg,#252525,#0d0d0d);border-radius:34px;padding:11px 9px;position:relative;box-shadow:0 28px 70px rgba(0,0,0,.95),0 0 0 1px #242424,inset 0 1px 0 rgba(255,255,255,.05)}
.phone-screen{background:#000;border-radius:26px;overflow:hidden}
.phone-notch{position:absolute;top:18px;left:50%;transform:translateX(-50%);width:70px;height:20px;background:#000;border-radius:10px}
.phone-home{width:80px;height:4px;background:#252525;border-radius:2px;margin:7px auto 2px}
.phone-btn-l{position:absolute;left:-4px;width:4px;background:#1e1e1e}
.phone-btn-r{position:absolute;right:-4px;width:4px;background:#1e1e1e;top:112px;height:56px;border-radius:0 2px 2px 0}
.scene-dots{display:flex;gap:4px;width:100%}
.scene-dot{flex:1;height:3px;border-radius:2px;transition:all .4s}
.now-label{font-size:11px;color:#555;align-self:flex-start}

/* Control buttons */
.ctrl-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%}
.ctrl-btn{padding:13px 8px;font-weight:700;font-size:13px;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;font-family:inherit;transition:all .2s}
.ctrl-play{border:1.5px solid var(--plt-color,#7C3AED);background:rgba(124,58,237,.1);color:var(--plt-color,#7C3AED)}
.ctrl-stop{border:1px solid #252525;background:#181818;color:#888}
.ctrl-rec{border:none;color:#fff;box-shadow:0 4px 16px rgba(124,58,237,.3)}
.ctrl-rec.idle{background:linear-gradient(135deg,#7C3AED,#EC4899)}
.ctrl-rec.recording{background:#3a0a0a;box-shadow:none}
.ctrl-rec.disabled{background:#181818;color:#555;cursor:not-allowed;box-shadow:none}

/* Download */
.dl-link{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;background:linear-gradient(135deg,#2E7D32,#4CAF50);color:#fff;border-radius:10px;font-size:13px;font-weight:700;text-decoration:none;margin-bottom:10px;box-shadow:0 4px 14px rgba(76,175,80,.3)}
.dl-tip{font-size:11px;color:#555;line-height:1.75}
.copy-btn{background:#1a1a1a;color:#888;border:1px solid #252525;border-radius:8px;padding:5px 12px;cursor:pointer;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:4px;white-space:nowrap;transition:all .2s;font-family:inherit}
.copy-btn.copied{background:#0d2a0d;color:#4CAF50;border-color:#4CAF50}

/* Blog */
.blog-box{width:100%;background:#0a0a0a;border:1px solid #FF6B3533;border-radius:12px;overflow:hidden;margin-top:8px}
.blog-header{background:#FF6B3511;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #FF6B3522}
.blog-title{font-size:12px;font-weight:700;color:#FF6B35}
.blog-content{padding:14px;max-height:300px;overflow-y:auto;font-size:12px;color:#ccc;line-height:1.9;white-space:pre-wrap;word-break:break-word}

/* Notice box */
.notice{width:100%;background:#0f0f0f;border:1px solid #151515;border-radius:10px;padding:12px;font-size:11px;color:#555;line-height:1.85}
.reset-btn{width:100%;padding:10px;background:#0f0f0f;color:#555;border:1px solid #1a1a1a;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}

/* Source links */
.src-item{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start}
.src-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;flex-shrink:0;text-decoration:none;margin-top:1px}
.src-desc{font-size:11px;color:#666;line-height:1.5}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeIn .3s ease}

/* hidden */
.hidden{display:none!important}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-icon">🎬</div>
  <div>
    <div class="header-title">쿠팡 숏폼 자동 영상 생성기</div>
    <div class="header-sub">AI 스크립트 → 해외영상 합성 → 한국어 음성 → 다운로드 → 블로그</div>
  </div>
  <div class="plt-badges">
    <span class="plt-badge" style="background:#FF000022;color:#FF6666;border:1px solid #FF000044">▶ 쇼츠</span>
    <span class="plt-badge" style="background:#E1306C22;color:#FF6B9D;border:1px solid #E1306C44">◉ 릴스</span>
    <span class="plt-badge" style="background:#25F4EE22;color:#69C9D0;border:1px solid #25F4EE44">♪ 틱톡</span>
  </div>
</div>

<div class="body-wrap">

  <!-- STEP BAR -->
  <div class="step-bar" id="stepBar">
    <!-- rendered by JS -->
  </div>

  <!-- MAIN CONTENT -->
  <div id="appContent"></div>

</div>

<!-- HIDDEN VIDEO for source -->
<video id="srcVideo" style="display:none" muted playsinline loop crossorigin="anonymous"></video>

<script>
// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
const S = {
  step: 0,
  affLink:'', productName:'', productPrice:'', productFeats:'',
  platform:'tiktok', duration:30, hookStyle:'shock',
  videoSrc:'', videoLoaded:false, videoErr:'',
  voices:[], selVoiceIdx:0, ttsRate:1.05, ttsPitch:1.05,
  loading:false, blogLoading:false,
  script:null, blog:'', showBlog:false,
  isPlaying:false, isRecording:false,
  curScene:0, sceneP:0,
  videoUrl:null, errMsg:'',
};

const PLATFORMS = [
  {id:'youtube', label:'유튜브 쇼츠', icon:'📺', color:'#FF0000'},
  {id:'instagram', label:'인스타 릴스', icon:'📸', color:'#E1306C'},
  {id:'tiktok', label:'틱톡', icon:'🎵', color:'#25F4EE'},
];
const HOOKS = [
  {id:'shock',label:'⚡ 충격 후크'},{id:'question',label:'🤔 질문 후크'},
  {id:'story',label:'📖 스토리 후크'},{id:'ranking',label:'🏆 랭킹 후크'},
];
const SCENE_KEYS  = ['hook','problem','solution','proof','cta'];
const SCENE_LABELS= ['HOOK','공감','소개','신뢰','CTA'];
const SCENE_DUR   = [3,5,8,5,4];
const STEPS = ['상품 정보','영상·음성','영상 완성'];
const CW=360, CH=640;
const MODEL = 'claude-sonnet-4-20250514';
const API_URL = 'https://api.anthropic.com/v1/messages';

// ═══════════════════════════════════════════════════════
//  RENDER ENGINE
// ═══════════════════════════════════════════════════════
function render(){
  renderStepBar();
  const el = document.getElementById('appContent');
  if(S.step===0) el.innerHTML = tmplStep0();
  else if(S.step===1) el.innerHTML = tmplStep1();
  else if(S.step===2) el.innerHTML = tmplStep2();
  el.className = 'fade-in';
  bindEvents();
  if(S.step===2) initCanvas();
}

function renderStepBar(){
  const bar = document.getElementById('stepBar');
  bar.innerHTML = STEPS.map((label,i)=>{
    const cls = i < S.step ? 'done' : i===S.step ? 'active' : 'inactive';
    const txt = i < S.step ? '✓' : i+1;
    const lc  = i===S.step ? '#A78BFA' : '#444';
    const lineBg = i < S.step ? '#7C3AED' : '#1a1a1a';
    return `
      <div style="display:flex;flex-direction:column;align-items:center;gap:5px">
        <div class="step-dot ${cls}">${txt}</div>
        <span class="step-label" style="color:${lc}">${label}</span>
      </div>
      ${i<STEPS.length-1?`<div class="step-line" style="background:${lineBg}"></div>`:''}
    `;
  }).join('');
}

// ═══════════════════════════════════════════════════════
//  TEMPLATES
// ═══════════════════════════════════════════════════════
function tmplStep0(){
  const plt = PLATFORMS.find(p=>p.id===S.platform);
  return `
  <div>
    <div class="section-title"><div class="section-num">1</div><div class="section-name">파트너스 링크 & 상품 정보</div></div>

    <div class="field">
      <label>🔗 쿠팡파트너스 링크 *</label>
      <input type="url" id="affLink" value="${S.affLink}" placeholder="https://link.coupang.com/a/..." style="border-color:${S.affLink.includes('coupang')?'#FF6B35':'#222'}">
      ${S.affLink.includes('coupang')?'<div class="hint-ok">✓ 쿠팡파트너스 링크 확인됨</div>':''}
      <div class="field-hint">partners.coupang.com에서 발급한 전용 링크를 입력하세요</div>
    </div>

    <div class="two-fields">
      <div class="field">
        <label>상품명 *</label>
        <input type="text" id="productName" value="${S.productName}" placeholder="예: 다이슨 에어랩">
      </div>
      <div class="field">
        <label>판매가 (선택)</label>
        <input type="text" id="productPrice" value="${S.productPrice}" placeholder="예: 599,000">
      </div>
    </div>

    <div class="field">
      <label>핵심 특징 (선택)</label>
      <textarea id="productFeats" rows="2" placeholder="예: 무선, 경량, 노이즈캔슬링, 방수 IPX5, 직장인 추천...">${S.productFeats}</textarea>
      <div class="field-hint">입력할수록 더 정확한 스크립트가 생성됩니다</div>
    </div>

    <div class="divider"></div>
    <div class="section-title"><div class="section-num">2</div><div class="section-name">플랫폼 & 영상 스타일</div></div>

    <div class="field">
      <label>📱 업로드 플랫폼</label>
      <div class="plt-btns">
        ${PLATFORMS.map(p=>`
          <button class="plt-btn" onclick="setPlatform('${p.id}')" style="${p.id===S.platform?`border-color:${p.color};background:${p.color}18;color:${p.color}`:''}">
            <span class="plt-icon">${p.icon}</span>${p.label}
          </button>
        `).join('')}
      </div>
    </div>

    <div class="two-fields">
      <div class="field">
        <label>⏱ 영상 길이</label>
        <div class="dur-btns">
          ${[15,30,60].map(d=>`
            <button class="dur-btn" onclick="setDuration(${d})" style="${S.duration===d?'border-color:#7C3AED;background:#7C3AED18;color:#A78BFA':''}">${d}초</button>
          `).join('')}
        </div>
      </div>
      <div class="field">
        <label>🪝 후크 스타일</label>
        <select id="hookStyle" class="hook-sel">
          ${HOOKS.map(h=>`<option value="${h.id}" ${S.hookStyle===h.id?'selected':''}>${h.label}</option>`).join('')}
        </select>
      </div>
    </div>

    <button class="btn-primary ${S.affLink&&S.productName?'purple':''}" id="btnNext0" onclick="goStep1()" ${!(S.affLink&&S.productName)?'disabled':''}>
      다음 → 영상 & 음성 설정
    </button>
  </div>`;
}

function tmplStep1(){
  const voiceList = S.voices.length === 0 ?
    `<div class="warn-box">
      <div class="warn-box-title">⚠️ 한국어 음성이 감지되지 않았습니다</div>
      <div class="warn-box-sub">
        Windows: 설정 → 시간 및 언어 → 음성 → 한국어 추가<br>
        Mac: 시스템 설정 → 손쉬운 사용 → 음성 콘텐츠 → 한국어
      </div>
    </div>` :
    `<div>${S.voices.map((v,i)=>`
      <div class="voice-item" onclick="selectVoice(${i})" style="${i===S.selVoiceIdx?'border-color:#7C3AED;background:#7C3AED18':''}">
        <div><span class="voice-name" style="${i===S.selVoiceIdx?'color:#A78BFA':''}">${v.name}</span><span class="voice-lang">${v.lang}</span></div>
        <span class="voice-status" style="${i===S.selVoiceIdx?'color:#7C3AED':''}">${i===S.selVoiceIdx?'✓ 선택됨':'클릭하면 미리듣기'}</span>
      </div>
    `).join('')}
    <div class="two-fields" style="margin-top:10px">
      <div class="field">
        <label>말하기 속도 ${S.ttsRate.toFixed(2)}x</label>
        <input type="range" min="0.7" max="1.4" step="0.05" value="${S.ttsRate}" oninput="S.ttsRate=+this.value;document.getElementById('rateVal').textContent=S.ttsRate.toFixed(2)+'x'">
        <div class="range-labels"><span>느리게</span><span>빠르게</span></div>
      </div>
      <div class="field">
        <label>목소리 높이 ${S.ttsPitch.toFixed(2)}</label>
        <input type="range" min="0.7" max="1.4" step="0.05" value="${S.ttsPitch}" oninput="S.ttsPitch=+this.value" style="accent-color:#EC4899">
        <div class="range-labels"><span>낮게</span><span>높게</span></div>
      </div>
    </div>
    </div>`;

  return `
  <div>

function loadVoices(){
  const all = window.speechSynthesis?.getVoices()||[];
  S.voices = all.filter(v=>v.lang.startsWith('ko'));
  if(!S.voices.length){
    window.speechSynthesis?.addEventListener('voiceschanged',()=>{
      S.voices=(window.speechSynthesis?.getVoices()||[]).filter(v=>v.lang.startsWith('ko'));
      if(S.step===1) render();
    },{once:true});
  }
}
function speakText(text){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='ko-KR'; u.rate=S.ttsRate; u.pitch=S.ttsPitch;
  if(S.voices[S.selVoiceIdx]) u.voice=S.voices[S.selVoiceIdx];
  window.speechSynthesis.speak(u);
}
function stopSpeech(){ window.speechSynthesis?.cancel(); }

function testVideo(url){
  const vEl=document.getElementById('srcVideo');
  S.videoLoaded=false; S.videoErr='';
  if(!url){ render(); return; }
  vEl.crossOrigin='anonymous'; vEl.src=url; vEl.muted=true; vEl.load();
  vEl.addEventListener('canplaythrough',()=>{ S.videoLoaded=true; if(S.step===1) render(); },{once:true});
  vEl.addEventListener('error',()=>{ S.videoErr='영상을 불러올 수 없습니다. CORS 허용 직접 링크를 사용하세요.'; if(S.step===1) render(); },{once:true});
}

// ═══════════════════════════════════════════════════════
//  CANVAS DRAW
// ═══════════════════════════════════════════════════════
function wrapText(ctx,text,maxW,font){
  ctx.font=font;
  const words=text.split(' '); let lines=[],line='';
  for(const w of words){
    const t=line+(line?' ':'')+w;
    if(ctx.measureText(t).width>maxW&&line){lines.push(line);line=w;}else line=t;
  }
  if(line)lines.push(line);
  return lines;
}

function drawFrame(canvas,opts){
  const{videoEl,subtitle,productName,price,affLink,pltColor,progress,sceneIdx,totalScenes,showCTA}=opts;
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  if(videoEl&&videoEl.readyState>=2){ctx.drawImage(videoEl,0,0,W,H);}
  else{const g=ctx.createLinearGradient(0,0,W,H);g.addColorStop(0,'#1a0035');g.addColorStop(1,'#06001a');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);}
  const vg=ctx.createLinearGradient(0,0,0,H);
  vg.addColorStop(0,'rgba(0,0,0,.55)');vg.addColorStop(.35,'rgba(0,0,0,.1)');vg.addColorStop(.65,'rgba(0,0,0,.1)');vg.addColorStop(1,'rgba(0,0,0,.82)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(0,0,0,.4)';ctx.fillRect(0,0,W,36);
  ctx.font='bold 11px sans-serif';ctx.fillStyle='#fff';ctx.textAlign='left';ctx.fillText('9:41',14,23);ctx.textAlign='right';ctx.fillText('▌▌ ◼◼◼◼',W-12,23);
  [['❤','2.4만'],['💬','843'],['⭐','저장'],['↗','공유']].forEach(([e,s],i)=>{
    const bx=W-32,by=H-100-i*66;
    ctx.beginPath();ctx.arc(bx,by,20,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,.45)';ctx.fill();
    ctx.font='18px sans-serif';ctx.textAlign='center';ctx.fillText(e,bx,by+7);
    ctx.font='bold 9px sans-serif';ctx.fillStyle='#fff';ctx.fillText(s,bx,by+22);
  });
  ctx.fillStyle='rgba(255,255,255,.2)';ctx.fillRect(0,H-3,W,3);
  ctx.fillStyle=pltColor;ctx.fillRect(0,H-3,W*((sceneIdx+progress)/totalScenes),3);
  ctx.fillStyle='rgba(0,0,0,.62)';ctx.fillRect(0,H-90,W,90);
  ctx.font='bold 13px -apple-system,sans-serif';ctx.fillStyle='#fff';ctx.textAlign='left';
  ctx.fillText('@'+(productName||'').replace(/\s/g,'_').toLowerCase().slice(0,16),12,H-68);
  ctx.font='11px sans-serif';ctx.fillStyle='rgba(255,255,255,.6)';
  const sl=(affLink||'').length>40?(affLink||'').slice(0,40)+'…':(affLink||'');
  ctx.fillText(sl,12,H-50);
  if(price){ctx.fillStyle='#FFD700';ctx.font='bold 12px sans-serif';ctx.fillText('💰 '+price+'원',12,H-30);}
  if(productName){
    ctx.font='bold 12px sans-serif';
    const chipW=ctx.measureText((productName||'').slice(0,22)).width+24;
    ctx.beginPath();
    if(ctx.roundRect)ctx.roundRect(W/2-chipW/2,44,chipW,22,11);else ctx.rect(W/2-chipW/2,44,chipW,22);
    ctx.fillStyle=pltColor+'cc';ctx.fill();
    ctx.fillStyle='#fff';ctx.textAlign='center';ctx.fillText((productName||'').slice(0,22),W/2,59);
  }
  if(subtitle){
    const reveal=Math.min(Math.floor(progress*subtitle.length*2.2),subtitle.length);
    const vis=subtitle.slice(0,reveal);
    const font="bold 17px 'Apple SD Gothic Neo','Noto Sans KR',-apple-system,sans-serif";
    const lines=wrapText(ctx,vis,W-60,font);
    const lineH=28,blockH=lines.length*lineH+16,blockY=H-130-blockH;
    ctx.beginPath();
    if(ctx.roundRect)ctx.roundRect(20,blockY-4,W-40,blockH,10);else ctx.rect(20,blockY-4,W-40,blockH);
    ctx.fillStyle='rgba(0,0,0,.62)';ctx.fill();
    ctx.font=font;ctx.fillStyle='#fff';ctx.textAlign='center';ctx.shadowColor='#000';ctx.shadowBlur=8;
    lines.forEach((line,i)=>ctx.fillText(line,W/2,blockY+i*lineH+lineH-4));
    ctx.shadowBlur=0;
  }
  if(showCTA&&progress>.45){
    const a=Math.min((progress-.45)/.25,1);ctx.globalAlpha=a;
    ctx.beginPath();
    if(ctx.roundRect)ctx.roundRect(24,H-162,W-48,46,12);else ctx.rect(24,H-162,W-48,46);
    ctx.fillStyle=pltColor;ctx.fill();
    ctx.font="bold 14px -apple-system,'Apple SD Gothic Neo',sans-serif";ctx.fillStyle='#fff';ctx.textAlign='center';
    ctx.fillText('🛒  쿠팡에서 최저가 확인하기',W/2,H-132);ctx.globalAlpha=1;
  }
  if(Math.floor(Date.now()/700)%2){ctx.beginPath();ctx.arc(W-18,24,5,0,Math.PI*2);ctx.fillStyle='#FF3333';ctx.fill();}
}

// ═══════════════════════════════════════════════════════
//  ANIMATION
// ═══════════════════════════════════════════════════════
let rafId=null, recorderObj=null, recChunks=[];
const sceneIdxRef={v:0}, sceneStartRef={v:0}, playingRef={v:false};

function getScenes(){
  if(!S.script) return [];
  const total=SCENE_DUR.reduce((a,b)=>a+b,0);
  return SCENE_KEYS.map((k,i)=>({
    key:k,text:S.script[k]||'',isCTA:k==='cta',
    dur:Math.max(Math.round((SCENE_DUR[i]/total)*S.duration),1)
  }));
}

function animTick(){
  if(!playingRef.v) return;
  const canvas=document.getElementById('mainCanvas');
  if(!canvas){playingRef.v=false;return;}
  const scenes=getScenes();
  const idx=sceneIdxRef.v;
  if(idx>=scenes.length) return;
  const sc=scenes[idx];
  const elapsed=(performance.now()-sceneStartRef.v)/1000;
  const p=Math.min(elapsed/sc.dur,1);
  S.curScene=idx; S.sceneP=p;
  updateSceneDots(idx);

  const vEl=document.getElementById('srcVideo');
  if(vEl&&vEl.readyState>=2&&vEl.paused) vEl.play().catch(()=>{});
  if(vEl&&vEl.duration&&vEl.currentTime>=vEl.duration-.1) vEl.currentTime=0;

  const plt=PLATFORMS.find(x=>x.id===S.platform);
  drawFrame(canvas,{videoEl:vEl,subtitle:sc.text,productName:S.productName,price:S.productPrice,affLink:S.affLink,pltColor:plt.color,progress:p,sceneIdx:idx,totalScenes:scenes.length,showCTA:sc.isCTA});

  if(p>=1){
    const next=idx+1;
    if(next<scenes.length){
      sceneIdxRef.v=next;sceneStartRef.v=performance.now();
      speakText(scenes[next].text);
    } else {
      playingRef.v=false;S.isPlaying=false;
      if(recorderObj&&recorderObj.state!=='inactive') recorderObj.stop();
      S.isRecording=false;
      const vv=document.getElementById('srcVideo');
      if(vv){vv.pause();vv.currentTime=0;}
      updateCtrlBtns();return;
    }
  }
  rafId=requestAnimationFrame(animTick);
}

function doPlay(){
  if(!S.script) return;
  stopSpeech(); cancelAnimationFrame(rafId);
  const vEl=document.getElementById('srcVideo');
  if(vEl) vEl.currentTime=0;
  sceneIdxRef.v=0;sceneStartRef.v=performance.now();
  playingRef.v=true;S.isPlaying=true;S.curScene=0;S.sceneP=0;
  updateCtrlBtns();
  const scenes=getScenes();
  speakText(scenes[0].text);
  rafId=requestAnimationFrame(animTick);
}

function doStop(){
  stopSpeech(); cancelAnimationFrame(rafId);
  playingRef.v=false;S.isPlaying=false;
  if(recorderObj&&recorderObj.state!=='inactive') recorderObj.stop();
  S.isRecording=false;
  const vEl=document.getElementById('srcVideo');
  if(vEl){vEl.pause();vEl.currentTime=0;}
  updateCtrlBtns();
}

function doRecord(){
  if(S.isPlaying) return;
  const canvas=document.getElementById('mainCanvas');
  if(!canvas) return;
  S.videoUrl=null; recChunks=[];
  const stream=canvas.captureStream(30);
  const mime=['video/webm;codecs=vp9','video/webm','video/mp4'].find(m=>{try{return MediaRecorder.isTypeSupported(m);}catch(e){return false;}})||'video/webm';
  recorderObj=new MediaRecorder(stream,{mimeType:mime});
  recorderObj.ondataavailable=e=>{if(e.data.size>0)recChunks.push(e.data);};
  recorderObj.onstop=()=>{
    const blob=new Blob(recChunks,{type:mime});
    S.videoUrl=URL.createObjectURL(blob);
    S.isRecording=false;
    render();
  };
  recorderObj.start(100);S.isRecording=true;
  doPlay();
}

function updateSceneDots(idx){
  const dots=document.querySelectorAll('.scene-dot');
  const plt=PLATFORMS.find(x=>x.id===S.platform);
  dots.forEach((d,i)=>{d.style.background=i<idx?'#7C3AED':i===idx?plt.color:'#1e1e1e';});
  const lbl=document.querySelector('.now-label');
  if(lbl)lbl.textContent=SCENE_LABELS[idx]+' 재생 중...';
}

function updateCtrlBtns(){
  // Re-render ctrl area after play/stop
  const wrap=document.querySelector('.ctrl-btns');
  if(!wrap) return;
  const plt=PLATFORMS.find(x=>x.id===S.platform);
  const playBtn=S.isPlaying
    ?`<button class="ctrl-btn ctrl-stop" onclick="doStop()">⏹ 정지</button>`
    :`<button class="ctrl-btn ctrl-play" style="--plt-color:${plt.color}" onclick="doPlay()">▶ 미리보기 + 음성</button>`;
  const recCls=S.isRecording?'recording':S.isPlaying&&!S.isRecording?'disabled':'idle';
  const recLabel=S.isRecording?'🔴 녹화 중...':'⬇ 영상 저장';
  wrap.innerHTML=playBtn+`<button class="ctrl-btn ctrl-rec ${recCls}" onclick="${S.isPlaying&&!S.isRecording?'':'doRecord()'}">${recLabel}</button>`;
}

function initCanvas(){
  requestAnimationFrame(()=>{
    const canvas=document.getElementById('mainCanvas');
    if(!canvas||!S.script) return;
    const scenes=getScenes();
    const plt=PLATFORMS.find(x=>x.id===S.platform);
    const vEl=document.getElementById('srcVideo');
    drawFrame(canvas,{videoEl:vEl,subtitle:scenes[0]?.text||'',productName:S.productName,price:S.productPrice,affLink:S.affLink,pltColor:plt.color,progress:0,sceneIdx:0,totalScenes:scenes.length,showCTA:false});
  });
}

//  API CALLS
// ═══════════════════════════════════════════════════════
async function callClaude(prompt){
  const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:MODEL,max_tokens:1000,messages:[{role:'user',content:prompt}]})});
  if(!r.ok){const d=await r.json().catch(()=>({}));throw new Error(d?.error?.message||`오류 ${r.status}`);}
  const d=await r.json();
  return (d.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
}

async function generateScript(){
  S.affLink    = val('affLink')||S.affLink;
  S.videoSrc   = val('videoSrc')||S.videoSrc;
  if(!S.productName){S.errMsg='상품명을 입력해주세요.';render();return;}
  S.errMsg='';S.loading=true;S.script=null;S.videoUrl=null;render();
  const hookDesc={shock:'충격 폭로형',question:'공감 질문형',story:'경험담형',ranking:'랭킹 추천형'}[S.hookStyle];
  const prompt=`한국 TOP 숏폼 크리에이터입니다. ${S.duration}초 숏폼 대사 스크립트를 JSON으로만 응답하세요. 마크다운 없이 순수 JSON만.

상품명: ${S.productName}
${S.productPrice?`가격: ${S.productPrice}원`:''}
${S.productFeats?`특징: ${S.productFeats}`:''}
파트너스링크: ${S.affLink||'https://www.coupang.com'}
후크: ${hookDesc}

{"title":"클릭율 높은 영상 제목","hook":"0~3초 강렬한 첫마디 (15자 이내 구어체)","problem":"시청자 공감 대사","solution":"상품 핵심 기능 소개 대사","proof":"실 사용 후기 신뢰 대사","cta":"구매 유도 CTA (링크 언급)","hashtags":"#태그1 #태그2 #태그3 #태그4 #태그5 #태그6 #태그7 #태그8"}`;
  try{
    const raw=await callClaude(prompt);
    const s=raw.indexOf('{'),e=raw.lastIndexOf('}');
    if(s===-1||e===-1)throw new Error('응답 파싱 오류 — 다시 시도해주세요');
    S.script=JSON.parse(raw.slice(s,e+1));
    S.step=2;
  }catch(err){S.errMsg=err.message||'생성 오류. 다시 시도해주세요.';}
  S.loading=false;render();
}

async function generateBlog(){
  if(S.blogLoading) return;
  S.blogLoading=true;S.blog='';S.showBlog=true;render();
  const prompt=`당신은 10년 경력 육아맘 블로거입니다. 쿠팡 상품 체험 리뷰 블로그 글을 작성해주세요.

상품: ${S.productName}
${S.productPrice?`가격: ${S.productPrice}원`:''}
${S.productFeats?`특징: ${S.productFeats}`:''}
구매링크: ${S.affLink||'https://www.coupang.com'}

규칙:
- 맘카페 말투: "~해요체", "근데", "솔직히", "진짜로", "대박이에요", "강추드려요!" 자연스럽게 사용
- AI 티 절대 금지: "첫째로", "마지막으로", "결론적으로" 같은 목록형 표현 금지
- 실제 구매한 사람처럼: 배송받은 날, 포장 뜯는 설레임, 쓰면서 느낀 점 자연스럽게
- 단점도 한두 가지 솔직하게 (신뢰감)
- 파트너스 링크를 글 중간 2번, 마지막 1번 자연스럽게 삽입
- 글자 수 800~1200자
- 제목, 소제목 포함 (## 형식)
- 마지막에 "※ 이 포스팅은 쿠팡 파트너스 활동의 일환으로, 이에 따른 일정액의 수수료를 제공받습니다." 추가`;
  try{S.blog=await callClaude(prompt);}
  catch(e){S.blog='블로그 생성 오류. 다시 시도해주세요.';}
  S.blogLoading=false;render();
}

function copyBlog(){
  navigator.clipboard.writeText(S.blog).then(()=>{
    const btn=document.getElementById('copyBlogBtn');
    if(btn){btn.textContent='✓ 복사됨';btn.classList.add('copied');setTimeout(()=>{btn.textContent='📋 전체 복사';btn.classList.remove('copied');},2000);}
  });
}
